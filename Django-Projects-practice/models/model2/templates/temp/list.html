<!DOCTYPE html>
<html>
<head>
    <title>Product List</title>
</head>
<body>

    <h1>All Products</h1>

    <table border="1" cellpadding="10">
        <tr>
            <th>Name</th>
            <th>Price</th>
            <th>Quantity</th>
            <th>Description</th>
        </tr>

        {% for p in product %}
        <tr>
            <td>{{ p.name }}</td>
            <td>{{ p.price }}</td>
            <td>{{ p.quantity }}</td>
            <td>{{ p.description }}</td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="4">No products found</td>
        </tr>
        {% endfor %}
    </table>

    <br>
    <a href="/">⬅ Back to Add Product</a>

</body>
</html>
